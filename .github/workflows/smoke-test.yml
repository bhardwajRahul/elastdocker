# Boots the full Elastic Stack the same way local dev does (`mise run stack:setup && mise run up`),
# then smoke-tests that Elasticsearch and Kibana come up. Also scans the locally-built Elasticsearch
# image with Trivy and uploads the findings to the Security tab.
name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [main]
  schedule:
    # Weekly sweep so image CVEs surface even without a push (heavy stack, so not daily).
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

# One run per PR (or ref) — newer pushes cancel stale runs.
concurrency:
  group: smoke-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload Trivy SARIF to the Security tab
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          install_args: "--locked" # honor mise.lock
          cache: true
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # SO tool installs don't hit API rate limits

      # Same tasks local dev runs: generate certs + keystore, then build & start the core stack.
      - name: Build & Deploy
        run: mise run stack:setup && mise run up

      - name: Test Elasticsearch
        run: timeout 240s sh -c "until curl https://elastic:changeme@localhost:9200 --insecure --silent; do echo 'Elasticsearch Not Up, Retrying...'; sleep 3; done" && echo 'Elasticsearch is up'

      - name: Test Kibana
        run: timeout 240s sh -c "until curl https://localhost:5601 --insecure --silent -I; do echo 'Kibana Not Ready, Retrying...'; sleep 3; done" && echo 'Kibana is up'

      # Resolve the built image tag from the committed .env (ELK_VERSION rots otherwise).
      - name: Resolve scan image
        run: |
          set -a; . ./.env; set +a
          echo "SCAN_IMAGE=${ELASTICSEARCH_IMAGE_NAME}:${ELK_VERSION}" >> "$GITHUB_ENV"

      - name: Trivy scan (image → SARIF)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.SCAN_IMAGE }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0" # report findings, don't fail the smoke test on a known CVE
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Trivy DB pulls, avoid anonymous rate limits

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          sarif_file: trivy-results.sarif
