name: auto-release

on:
  push:
    # branches to consider in the event; optional, defaults to all
    branches:
      - main
  # pull_request event is required only for autolabeler
  pull_request:
    # `edited` keeps title-based autolabels fresh when a PR is retitled.
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: write # release-drafter creates/updates the draft release
  pull-requests: write # autolabeler labels PRs

# Serialize release drafting; never cancel a run mid-draft.
concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      # Drafts your next Release notes as Pull Requests are merged into "main"
      - uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7 # v6.4.0
        with:
          publish: false
          prerelease: true
          config-name: auto-release.yml
          # allows autolabeler to run without unmerged PRs from being added to draft
          disable-releaser: ${{ github.ref_name != 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
